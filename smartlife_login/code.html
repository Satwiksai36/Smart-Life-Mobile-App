<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartLife - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-highest": "#d3e4fe",

                      "tertiary-fixed": "#6bff8f",
                      "on-secondary-fixed": "#001f26",
                      "on-primary": "#ffffff",
                      "surface-bright": "#f8f9ff",
                      "on-error-container": "#93000a",
                      "on-tertiary-fixed": "#002109",
                      "primary": "#3525cd",
                      "on-secondary-container": "#006172",
                      "primary-fixed": "#e2dfff",
                      "on-tertiary-fixed-variant": "#005321",
                      "tertiary": "#005523",
                      "inverse-on-surface": "#eaf1ff",
                      "on-surface-variant": "#464555",
                      "error": "#ba1a1a",
                      "primary-fixed-dim": "#c3c0ff",
                      "outline-variant": "#c7c4d8",
                      "surface-variant": "#d3e4fe",
                      "surface-tint": "#4d44e3",
                      "on-primary-fixed-variant": "#3323cc",
                      "on-secondary": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "surface-container": "#e5eeff",
                      "inverse-surface": "#213145",
                      "secondary": "#00687a",
                      "error-container": "#ffdad6",
                      "on-background": "#0b1c30",
                      "tertiary-fixed-dim": "#4ae176",
                      "on-error": "#ffffff",
                      "secondary-container": "#57dffe",
                      "surface-container-low": "#eff4ff",
                      "secondary-fixed-dim": "#4cd7f6",
                      "on-primary-fixed": "#0f0069",
                      "surface-container-lowest": "#ffffff",
                      "on-primary-container": "#dad7ff",
                      "surface": "#f8f9ff",
                      "on-secondary-fixed-variant": "#004e5c",

                      "inverse-primary": "#c3c0ff",
                      "primary-container": "#4f46e5",
                      "background": "#f8f9ff",

              "spacing": {
                      "xs": "4px",
                      "xl": "32px",
                      "base": "4px",
                      "sm": "8px",
                      "md": "16px",
                      "gutter": "16px",
                      "lg": "24px",
                      "container-margin": "20px"

              "fontFamily": {

                      "headline-lg": ["Inter"]

              "fontSize": {

                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}]

            }
          }
        }

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }
        .ambient-shadow {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        }
        .bg-pattern {
            background-color: #f8f9ff;
            background-image: radial-gradient(circle at 100% 100%, rgba(226, 223, 255, 0.5) 0, transparent 40%),
                              radial-gradient(circle at 0% 0%, rgba(211, 228, 254, 0.5) 0, transparent 40%);
        }
    </style>
</head>
<body class="h-full bg-pattern flex items-center justify-center p-md font-sans text-on-surface">
<main class="w-full max-w-[420px] mx-auto z-10 relative">
<!-- Logo -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">SmartLife</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-sm">Intelligent Living, Simplified.</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-[24px] p-xl ambient-shadow">
<div class="flex justify-center mb-lg">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="face" data-weight="fill" style="font-variation-settings: 'FILL' 1;">face</span>
</div>
</div>
<form action="#" class="space-y-md" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="mail">mail</span>
</div>
<input class="glass-input block w-full pl-10 pr-3 py-3 rounded-xl font-body-md text-body-md text-on-surface placeholder-outline-variant focus:ring-0 focus:outline-none" id="email" name="email" placeholder="alex@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="lock">lock</span>
</div>
<input class="glass-input block w-full pl-10 pr-10 py-3 rounded-xl font-body-md text-body-md text-on-surface placeholder-outline-variant focus:ring-0 focus:outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-[0_10px_20px_rgba(79,70,229,0.2)] font-title-lg text-title-lg text-on-primary bg-gradient-to-r from-primary to-primary-container hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transform hover:-translate-y-0.5 transition-all duration-200" type="submit">
                        Sign In
                    </button>
</div>
</form>
<div class="mt-lg">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-transparent text-outline-variant font-label-md text-label-md backdrop-blur-md">Or continue with</span>
</div>
</div>
<div class="mt-lg grid grid-cols-2 gap-sm">
<a class="w-full inline-flex justify-center py-2.5 px-4 rounded-xl shadow-sm bg-white/50 border border-white/80 hover:bg-white/80 font-label-md text-label-md text-on-surface transition-colors items-center space-x-2" href="#">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Google</span>
</a>
<a class="w-full inline-flex justify-center py-2.5 px-4 rounded-xl shadow-sm bg-white/50 border border-white/80 hover:bg-white/80 font-label-md text-label-md text-on-surface transition-colors items-center space-x-2" href="#">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M16.365 14.363c-.035-2.909 2.37-4.321 2.477-4.39-1.353-1.974-3.447-2.242-4.188-2.274-1.782-.178-3.484 1.053-4.394 1.053-.907 0-2.316-1.018-3.799-.989-1.942.029-3.733 1.129-4.73 2.854-2.015 3.498-.515 8.683 1.455 11.536.958 1.391 2.092 2.946 3.606 2.894 1.452-.053 2.008-.934 3.766-.934 1.751 0 2.257.934 3.782.903 1.572-.029 2.548-1.42 3.495-2.81 1.1-1.605 1.554-3.161 1.576-3.242-.036-.015-3.037-1.168-3.046-4.601zm-2.584-6.331c.792-.958 1.326-2.292 1.179-3.626-1.144.047-2.531.764-3.342 1.722-.65.766-1.289 2.128-1.12 3.424 1.286.1 2.502-.565 3.283-1.52z"></path>
</svg>
<span>Apple</span>
</a>
</div>
</div>
<p class="mt-md text-center font-body-md text-body-md text-on-surface-variant">
                Don't have an account? <a class="font-title-lg text-title-lg text-primary hover:text-primary-container transition-colors" href="#">Sign up</a>
</p>
</div>
</main>
</body></html>
